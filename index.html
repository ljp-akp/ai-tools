<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12生肖风险检测工具</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:#fff;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
}
textarea{
    width:100%;
    height:150px;
    padding:10px;
    border-radius:10px;
}
button{
    margin-top:10px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.result{
    margin-top:20px;
    padding:15px;
    background:#1e293b;
    border-radius:10px;
}
.high{
    color:#ff4d4f;
}
.mid{
    color:#faad14;
}
.low{
    color:#52c41a;
}
</style>
</head>

<body>

<div class="container">

<h2>12生肖风险检测工具（娱乐版）</h2>

<p>粘贴生肖记录，例如：</p>

<pre>
鼠
牛
虎
兔
龙
鼠
鼠
马
</pre>

<textarea id="data"></textarea>

<br>

<button onclick="checkRisk()">开始检测</button>

<div class="result" id="result"></div>

</div>

<script>

function checkRisk(){

const txt=document.getElementById("data").value.trim();

if(!txt){
    alert("请输入数据");
    return;
}

const arr=txt.split(/[\n,，\s]+/).filter(Boolean);

const count={};

arr.forEach(item=>{
    count[item]=(count[item]||0)+1;
});

let max=0;

for(let k in count){
    if(count[k]>max) max=count[k];
}

let risk="低风险";
let cls="low";

if(max>=5){
    risk="高风险";
    cls="high";
}else if(max>=3){
    risk="中风险";
    cls="mid";
}

let html=`<h3 class="${cls}">${risk}</h3>`;
html+=`<p>总记录：${arr.length}</p>`;
html+=`<hr>`;

for(let k in count){
    html+=`${k}：${count[k]} 次<br>`;
}

html+=`
<hr>
<p>
说明：<br>
本工具仅统计数据分布情况。<br>
不提供中奖预测。<br>
不提供投注建议。<br>
仅用于娱乐和风险提醒。
</p>
`;

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
